apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: seaweedfs-secrets
  namespace: seaweedfs
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-store
    kind: SecretStore
  target:
    name: seaweedfs-s3-secrets
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        seaweedfs_s3_config: |
          {
            "identities": [
              {
                "name": "loki",
                "credentials": [
                  {
                    "accessKey": "{{ .loki-accessKey }}",
                    "secretKey": "{{ .loki-secretKey }}"
                  }
                ],
                "actions": [
                  "Read",
                  "Write",
                  "List",
                  "Tagging"
                ]
              }
            ]
          }
 
  data:
    - secretKey: accessKey
      remoteRef:
        key: seaweedfs/s3-credentials
        property: loki-accessKey
 
    - secretKey: secretKey
      remoteRef:
        key: seaweedfs/s3-credentials
        property: loki-secretKey
