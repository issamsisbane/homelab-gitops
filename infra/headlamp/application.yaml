apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: headlamp
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    workload-type: infra
spec:
  project: infra

  source:
    repoURL: https://kubernetes-sigs.github.io/headlamp
    targetRevision: 0.40.0
    chart: headlamp
    helm:
      values: |
        config:
          oidc:
            clientID:
              valueFrom:
                secretKeyRef:
                  name: headlamp-oidc
                  key: client-id
            clientSecret:
              valueFrom:
                secretKeyRef:
                  name: headlamp-oidc
                  key: client-secret
            issuerURL:
              valueFrom:
                secretKeyRef:
                  name: headlamp-oidc
                  key: issuer-url
            scopes: "openid email profile groups"
  destination:
    server: https://kubernetes.default.svc
    namespace: headlamp

  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: true

    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
