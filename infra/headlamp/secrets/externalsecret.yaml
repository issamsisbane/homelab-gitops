apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: headlamp-oidc
  namespace: headlamp
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-store
    kind: SecretStore
  target:
    name: headlamp-oidc
    creationPolicy: Owner
  data:
    - secretKey: OIDC_CLIENT_ID
      remoteRef:
        key: headlamp/oidc
        property: OIDC_CLIENT_ID
    - secretKey: OIDC_CLIENT_SECRET
      remoteRef:
        key: headlamp/oidc
        property: OIDC_CLIENT_SECRET
    - secretKey: OIDC_ISSUER_URL
      remoteRef:
        key: headlamp/oidc
        property: OIDC_ISSUER_URL
    - secretKey: OIDC_SCOPES
      remoteRef:
        key: headlamp/oidc
        property: OIDC_SCOPES
