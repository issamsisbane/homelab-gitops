---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: prometheus
  namespace: observability
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasource:
    name: Prometheus
    type: prometheus
    url: http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090
    access: proxy
    isDefault: true
    jsonData:
      timeInterval: "30s"
      httpMethod: POST
      exemplarTraceIdDestinations: []

---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: loki
  namespace: observability
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasource:
    name: Loki
    type: loki
    url: http://loki.observability.svc.cluster.local:3100
    access: proxy
    isDefault: false
    jsonData:
      maxLines: 1000
      derivedFields: []
