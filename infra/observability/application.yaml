apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infra

  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    # Vérifier la dernière version : helm search repo prometheus-community/kube-prometheus-stack --versions
    targetRevision: 82.15.1

    helm:
      values: |
        namespaceOverride: "observability"
        grafana:
          enabled: false

        prometheus:
          prometheusSpec:
            retention: 15d

            retentionSize: "9GB"

            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
            ruleSelectorNilUsesHelmValues: false
            probeSelectorNilUsesHelmValues: false
            serviceMonitorSelector: {}
            podMonitorSelector: {}
            ruleSelector: {}
            probeSelector: {}
            serviceMonitorNamespaceSelector: {}
            podMonitorNamespaceSelector: {}
            ruleNamespaceSelector: {}

            scrapeInterval: "30s"
            evaluationInterval: "30s"

            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: longhorn
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 10Gi

            resources:
              requests:
                memory: "400Mi"
                cpu: "100m"
              limits:
                memory: "1Gi"
                cpu: "500m"

            replicas: 1

            podAntiAffinity: ""

          service:
            type: ClusterIP

        alertmanager:
          alertmanagerSpec:
            replicas: 1

            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: longhorn
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 1Gi

            resources:
              requests:
                memory: "32Mi"
                cpu: "10m"
              limits:
                memory: "128Mi"
                cpu: "100m"

          service:
            type: ClusterIP

          config:
            global:
              resolve_timeout: 5m
            route:
              group_by: ['namespace', 'alertname']
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 12h
              receiver: 'null'
            receivers:
              - name: 'null'
            inhibit_rules:
              - source_matchers:
                  - severity="critical"
                target_matchers:
                  - severity="warning"
                equal: ['namespace', 'alertname']

        nodeExporter:
          enabled: true

        prometheus-node-exporter:
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "100m"

        kubeStateMetrics:
          enabled: true

        kube-state-metrics:
          resources:
            requests:
              memory: "64Mi"
              cpu: "10m"
            limits:
              memory: "128Mi"
              cpu: "100m"

        kubeApiServer:
          enabled: true

        kubelet:
          enabled: true

        kubeControllerManager:
          enabled: true

        kubeScheduler:
          enabled: true

        kubeProxy:
          enabled: true

        coreDns:
          enabled: true

        kubeEtcd:
          enabled: true

        prometheusOperator:
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"

          admissionWebhooks:
            enabled: true
            patch:
              enabled: false
            certManager:
              enabled: true

        defaultRules:
          create: true
          rules:
            alertmanager: true
            etcd: true
            configReloaders: true
            general: true
            k8sContainerCpuUsageSecondsTotal: true
            k8sContainerMemoryCache: true
            k8sContainerMemoryRss: true
            k8sContainerMemorySwap: true
            k8sContainerResource: true
            k8sPodOwner: true
            kubeApiserverAvailability: true
            kubeApiserverBurnrate: true
            kubeApiserverHistogram: true
            kubeApiserverSlos: true
            kubeControllerManager: true
            kubelet: true
            kubeProxy: true
            kubePrometheusGeneral: true
            kubePrometheusNodeRecording: true
            kubernetesApps: true
            kubernetesResources: true
            kubernetesStorage: true
            kubernetesSystem: true
            kubeSchedulerAlerting: true
            kubeSchedulerRecording: true
            kubeStateMetrics: true
            network: true
            node: true
            nodeExporterAlerting: true
            nodeExporterRecording: true
            prometheus: true
            prometheusOperator: true
            windows: false
  destination:
    server: https://kubernetes.default.svc
    namespace: observability

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ReplaceCRDs=false
    automated:
      prune: false
      selfHeal: true
