apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infra

  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: 6.55.0

    helm:
      releaseName: loki
      values: |
        deploymentMode: SingleBinary

        loki:
          auth_enabled: false
          schemaConfig:
            configs:
              - from: "2025-01-01"
                store: tsdb
                object_store: s3
                schema: v13
                index:
                  prefix: loki_index_
                  period: 24h

          storage:
            type: s3
            s3:
              endpoint: http://seaweedfs-filer.seaweedfs.svc.cluster.local:8333
              region: us-east-1
              secretAccessKey: "${S3_SECRET_ACCESS_KEY}"
              accessKeyId: "${S3_ACCESS_KEY_ID}"
              s3ForcePathStyle: true
              insecure: true
            bucketNames:
              chunks: chunks
              ruler: ruler
              admin: admin

          limits_config:
            retention_period: 30d
            ingestion_burst_size_mb: 16
            ingestion_rate_mb: 8
            max_streams_per_user: 10000

          compactor:
            working_directory: /var/loki/compactor
            compaction_interval: 10m
            retention_enabled: true
            retention_delete_delay: 2h
            retention_delete_worker_count: 150
            delete_request_store: s3

          common:
            replication_factor: 1
            path_prefix: /var/loki
            storage:
              s3:
                endpoint: http://seaweedfs-filer.seaweedfs.svc.cluster.local:8333
                region: us-east-1
                secretAccessKey: "${S3_SECRET_ACCESS_KEY}"
                accessKeyId: "${S3_ACCESS_KEY_ID}"
                s3ForcePathStyle: true
                insecure: true

          rulerConfig:
            storage:
              type: s3
              s3:
                bucketnames: ruler

        singleBinary:
          replicas: 1

          extraEnv:
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: seaweedfs-s3-loki-credentials
                  key: S3_ACCESS_KEY_ID
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: seaweedfs-s3-loki-credentials
                  key: S3_SECRET_ACCESS_KEY

          persistence:
            enabled: true
            storageClass: longhorn
            size: 5Gi

          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "300m"

        backend:
          replicas: 0

        read:
          replicas: 0

        write:
          replicas: 0

        ingester:
          replicas: 0

        querier:
          replicas: 0

        queryFrontend:
          replicas: 0

        queryScheduler:
          replicas: 0

        distributor:
          replicas: 0

        compactor:
          replicas: 0

        indexGateway:
          replicas: 0

        bloomCompactor:
          replicas: 0

        bloomGateway:
          replicas: 0

        gateway:
          enabled: false

        monitoring:
          serviceMonitor:
            enabled: true
            labels:
              release: kube-prometheus-stack
          selfMonitoring:
            enabled: false
            grafanaAgent:
              installOperator: false
          lokiCanary:
            enabled: false

        test:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: observability

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true
