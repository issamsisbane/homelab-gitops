apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: openbao-store
  namespace: authentik
spec:
  provider:
    vault:
      server: "http://openbao.openbao.svc.cluster.local:8200"
      path: "authentik"       # le KV mount créé par OpenTofu
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "role-authentik"          # créé par OpenTofu
          serviceAccountRef:
            name: "sa-vault-authentik"    # le SA ci-dessus
