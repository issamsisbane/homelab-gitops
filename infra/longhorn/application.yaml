apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    workload-type: infra
spec:
  project: infra

  source:
    repoURL: https://charts.longhorn.io
    targetRevision: 1.11.0
    chart: longhorn
    helm:
      values: |
        persistence:
          defaultClassReplicaCount: 1
        preUpgradeChecker:
          upgradeVersionCheck: true
        image:
            longhorn:
              manager:
                tag: v1.11.0-hotfix-1
              instance-manager:
                tag: v1.11.0-hotfix-2

  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn

  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: true

    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
