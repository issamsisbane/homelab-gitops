apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: seaweedfs-s3-loki-credentials
  namespace: seaweedfs
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-store
    kind: SecretStore
  target:
    name: seaweedfs-s3-loki-credentials
    creationPolicy: Owner
    template:
      engineVersion: v2
      metadata:
        annotations:
          replicator.v1.mittwald.de/replication-allowed: "true"
          replicator.v1.mittwald.de/replicate-to: "observability" 
  data:
    - secretKey: S3_ACCESS_KEY_ID
      remoteRef:
        key: seaweedfs/s3-credentials
        property: lokiAccessKey
 
    - secretKey: S3_SECRET_ACCESS_KEY
      remoteRef:
        key: seaweedfs/s3-credentials
        property: lokiSecretKey
